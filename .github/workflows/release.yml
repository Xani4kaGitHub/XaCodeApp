name: Release XaCode

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: |
          npm run build
          npm test

      - name: Build Windows release
        run: npm run dist:win -- --publish never

      - name: Publish Windows release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          $setup = "release/XaCode Setup $version.exe"
          $blockmap = "$setup.blockmap"
          $uploadSetup = "release/XaCode-Setup-$version.exe"
          $uploadBlockmap = "$uploadSetup.blockmap"
          Copy-Item -LiteralPath $setup -Destination $uploadSetup
          Copy-Item -LiteralPath $blockmap -Destination $uploadBlockmap
          gh release create "v$version" $uploadSetup $uploadBlockmap "release/latest.yml" --title "XaCode $version" --generate-notes
