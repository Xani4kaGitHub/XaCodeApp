<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 240px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 12px;
      margin: 0;
      background: #1e1e2e;
      color: #cdd6f4;
    }
    .header {
      font-weight: bold;
      font-size: 14px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      padding: 8px;
      border-radius: 6px;
      background: #313244;
    }
    .indicator {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #f38ba8;
    }
    .indicator.connected {
      background: #a6e3a1;
    }
    .hint {
      font-size: 11px;
      color: #a6adc8;
      margin-top: 8px;
    }
    .token-input {
      width: 100%;
      box-sizing: border-box;
      background: #181825;
      border: 1px solid #45475a;
      color: #cdd6f4;
      padding: 6px;
      border-radius: 4px;
      margin-top: 6px;
      font-size: 11px;
    }
    .save-btn {
      width: 100%;
      margin-top: 6px;
      padding: 6px;
      background: #89b4fa;
      color: #11111b;
      border: none;
      border-radius: 4px;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="header">
    <span>⚡ XaCode Chrome Bridge</span>
  </div>
  <div class="status">
    <div id="dot" class="indicator"></div>
    <span id="status-text">Подключение...</span>
  </div>
  <div style="margin-top:10px;">
    <label style="font-size:11px; color:#a6adc8;">Секретный токен XaCodeApp:</label>
    <input type="password" id="token-input" class="token-input" placeholder="Вставьте секретный токен..." />
    <button type="button" id="save-token-btn" class="save-btn">Сохранить токен</button>
  </div>
  <div class="hint">
    Токен можно скопировать в Настройках XaCodeApp (вкладка «Браузер»).
  </div>
  <script src="popup.js"></script>
</body>
</html>
